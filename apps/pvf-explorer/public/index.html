<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PVF Explorer</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="window">
      <header class="toolbar">
        <div class="toolbar__controls">
          <label class="toolbar__group">
            <span>PVF</span>
            <select id="archive-select"></select>
          </label>
          <label class="toolbar__group">
            <span>文本</span>
            <select id="text-profile-select">
              <option value="simplified" selected>简体</option>
              <option value="traditional">繁体</option>
            </select>
          </label>
        </div>
        <div id="archive-status" class="toolbar__meta">正在读取 fixtures 中的 PVF...</div>
      </header>

      <main class="layout">
        <aside class="sidebar">
          <div class="panel-title">目录</div>
          <div id="tree-root" class="tree"></div>
        </aside>

        <section class="content">
          <div class="content__header">
            <div>
              <div class="panel-title">脚本</div>
              <div id="file-path" class="content__path">选择左侧文件查看内容</div>
            </div>
            <div class="content__actions">
              <div id="editor-mode" class="content__mode">只读预览</div>
              <button id="reset-button" type="button" class="action-button" disabled>还原</button>
              <button id="save-button" type="button" class="action-button action-button--primary" disabled>保存</button>
            </div>
          </div>
          <pre id="file-content" class="content__body"># PVF Explorer</pre>
          <textarea
            id="file-editor"
            class="content__editor is-hidden"
            spellcheck="false"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
          ></textarea>
        </section>
      </main>
    </div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
